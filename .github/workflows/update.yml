name: Update VitePress Blog
on:
  push:
    branches: master
  schedule:
    - cron: '0 10 * * *'

permissions: write-all

jobs:
  Update-Blog:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 检出 vitepress-blog 仓库
      - name: Checkout vitepress-blog
        uses: actions/checkout@v4
        with:
          repository: AllenYGY/vitepress-blog
          ref: master

      # Step 2: 配置 SSH
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      # Step 3: 检查 NOTE 仓库是否有新提交
      - name: Get NOTE commit hash
        id: note_hash
        run: |
          NOTE_HASH=$(git ls-remote git@github.com:AllenYGY/NOTE.git HEAD | awk '{print $1}')
          if [ -z "$NOTE_HASH" ]; then
            echo "Failed to resolve NOTE commit hash"
            exit 1
          fi
          echo "hash=$NOTE_HASH" >> $GITHUB_OUTPUT
          mkdir -p .note-cache
          echo "$NOTE_HASH" > .note-cache/note-commit.txt

      - name: Cache NOTE commit hash
        id: note_cache
        uses: actions/cache@v4
        with:
          path: .note-cache
          key: ${{ runner.os }}-note-${{ steps.note_hash.outputs.hash }}

      - name: Check NOTE update
        id: note_check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "${{ steps.note_cache.outputs.cache-hit }}" = "true" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Clone NOTE repository
        if: steps.note_check.outputs.changed == 'true'
        run: |
          echo "Cloning NOTE repository using SSH"
          cd docs
          git clone git@github.com:AllenYGY/NOTE.git
          cd ..

      - name: Sync NOTE content
        if: steps.note_check.outputs.changed == 'true'
        run: |
          python movefolder.py

      - name: Validate synced NOTE content
        id: synced_posts
        if: steps.note_check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          if [ ! -d "docs/posts" ]; then
            echo "docs/posts was not created after NOTE sync"
            exit 1
          fi

          POST_MD_COUNT=$(find docs/posts -type f -name "*.md" | wc -l | tr -d ' ')
          echo "post_md_count=$POST_MD_COUNT" >> "$GITHUB_OUTPUT"
          echo "Synced markdown posts: $POST_MD_COUNT"
          find docs/posts -maxdepth 2 -type f | sort | sed -n '1,40p'

          if [ "$POST_MD_COUNT" -eq 0 ]; then
            echo "NOTE sync produced zero markdown posts. Refusing to publish an empty site."
            exit 1
          fi

      - name: Detect content changes
        id: changes
        if: steps.note_check.outputs.changed == 'true'
        run: |
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Update timestamp
        if: steps.changes.outputs.changed == 'true'
        run: |
          echo "$(date +"%Y-%m-%d %H:%M:%S")" > update.txt

      # Step 4: 设置 Node.js 环境
      - name: Setup Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Cache VitePress + Slidev outputs
        if: steps.changes.outputs.changed == 'true'
        uses: actions/cache@v4
        with:
          path: |
            docs/.vitepress/cache
            docs/public/slides
          key: ${{ runner.os }}-vp-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-vp-

      # Step 6: 安装依赖
      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: |
          echo "Installing dependencies"
          npm ci

      # --- 关键步骤: 设置 Swap 虚拟内存 (系统层保护) ---
      - name: Set up Swap Space
        if: steps.changes.outputs.changed == 'true'
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show

      - name: Build Slidev decks
        if: steps.changes.outputs.changed == 'true'
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          SANITIZE_FRONTMATTER: 0
        run: |
          echo "Building Slidev decks..."
          npm run build:slides

      - name: Build vitepress-blog
        if: steps.changes.outputs.changed == 'true'
        env:
          NODE_OPTIONS: --max-old-space-size=12288
        run: |
          echo "Building full site..."
          rm -rf public
          npx vitepress build docs

      - name: Validate build output
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          for path in \
            public/index.html \
            public/page/blog.html \
            public/page/tags.html \
            public/page/archive.html \
            public/page/friend.html; do
            if [ ! -f "$path" ]; then
              echo "Missing expected build artifact: $path"
              exit 1
            fi
          done

          if [ ! -d "public/posts" ]; then
            echo "Build did not produce public/posts"
            exit 1
          fi

          POST_HTML_COUNT=$(find public/posts -type f -name "*.html" | wc -l | tr -d ' ')
          echo "Built post HTML pages: $POST_HTML_COUNT"
          find public/posts -maxdepth 2 -type f | sort | sed -n '1,40p'

          if [ "$POST_HTML_COUNT" -eq 0 ]; then
            echo "Build produced zero post pages. Refusing to publish an empty site."
            exit 1
          fi

      # Step 7.5: 确保 CNAME 文件存在于 public 目录
      - name: Ensure CNAME in public
        if: steps.changes.outputs.changed == 'true'
        run: |
          if [ -f "CNAME" ]; then
            cp CNAME public/CNAME
            echo "CNAME copied to public/"
          fi

      # Step 8: 同步更新到 vitepress-blog 仓库
      - name: Sync with vitepress-blog repository
        if: steps.changes.outputs.changed == 'true'
        run: |
          echo "Syncing files from NOTE to vitepress-blog"
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          rm -rf docs
          git add .
          mv public/ docs/
          if [ -f "docs/CNAME" ]; then
            echo "CNAME file found and will be preserved"
          else
            echo "Warning: CNAME file not found"
          fi
          git add .
          git commit -m "Synchronous updates: Copy files from the NOTE repository"
          git push -f origin HEAD:page
